sonar.projectKey=madeline-portfolio
sonar.projectName=Madeline Portfolio
sonar.sources=app,components,lib,theme
sonar.tests=tests,e2e

sonar.sourceEncoding=UTF-8

# Produced by `npm run test:coverage`.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.exclusions=\
  node_modules/**,\
  .next/**,\
  coverage/**,\
  playwright-report/**,\
  test-results/**,\
  public/**,\
  **/*.config.ts,\
  **/*.config.mjs

# Generated types and pure type declarations carry no logic to analyse.
sonar.coverage.exclusions=\
  lib/types/**,\
  lib/supabase/**,\
  tests/**,\
  e2e/**,\
  **/*.config.ts
